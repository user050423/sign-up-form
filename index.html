<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css"/>
    <title>Sign-up Form</title>
</head>
<body>
    <div class="logo container">
        <img src="assets/images/odin-lined.png" alt="TOP logo odin head">
        <h1>ODIN</h1>
    </div>

    <div class="form container">
        <h2 id="title">Welcome!</h1>
        <p id="subtitle">Please enter your details</p>
        <form action="#" method="post">
            <div class="input-container">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" minlength="1" placeholder="Mickey" required/>
            </div>

            <div class="input-container">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" placeholder="Mouse"required/>
            </div>
            
            <div class="input-container">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="mickeymouse@mail.com"required/>
            </div>

            <div class="input-container">
                <label for="phone_number">Phone Number</label>
                <input type="number" id="phone_number" name="phone_number" min="6" placeholder="09123456789"required/>
            </div>

            <div class="input-container">
                <label for="user-password">Password</label>
                <input type="password" id="user-password" name="user-password" required/>
            </div>

            <div class="input-container">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required/>
            </div>

            <button id="submitButton" type="submit">Create Account</button> 
        </form>
        <p id="bottom-subtitle">Already have an account? <span><a href="#">Log in</a></span></p> 
    </div>  
    <script src="scripts.js"></script>
</body>
</html>
